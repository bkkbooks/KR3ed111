front:
  text: 原序夫醫藥之來皆原於農黃二帝之書其奧博微妙莫不符契陰陽五行消長之理吻合君臣相與之道則固非庸流俗輩所能鉤索之也推聖人之心蓋深切於蠲疴濟世欲臍天下生靈於壽域而已矣董君汲少服儒術嗜閲醫經洞徹其簡切應用者近百餘方可以備旅舍應猝之用編目成集共為一卷號曰旅舍備要方將鏤板以廣其傳君可謂能推究聖人之所存心者哉誠可嘉尚余故輒為之引云孟震序自序汲少小多病因習醫藥常思世人榮辱汩馳喜怒妄作飲食不節興居無常倏忽之間疾起不測迫於倉卒不暇藥餌以斯致困可不惜哉況宦遊南北客涉道途冒觸居多邪氣易入方藥備急尤當究心且如觸寒心痛冒熱中暍厥風涎潮伏暑霍亂亟來急治方可安全推類求之不能悉數汲自業醫以來收經效奇方計百餘道證詳而法略使覽之者曉然可用目之曰旅舍備要方為一卷庶幾道途疾病治療有歸不敢私隱具録如下董汲序
  hash: sha256:0a7602516fdca8412a5b4bde374d009032f88720bb51d7cd600f8d9fd64e7ea4
