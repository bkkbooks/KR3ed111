body:
  text: 斑疹神仙紫雪治大人小兒一切熱毒胃熱發斑消豆疱麩疹及傷寒熱入胃發斑並小兒驚癇涎厥走馬急疳黃瘦喉痹腫痛及瘡疹毒攻咽喉水漿不下黃金一百兩寒水石石膏各三斤犀角羚羊角各十兩屑玄參一斤沒香木香丁香各五兩甘草八兩升麻六兩上㕮咀以水五斗煮金至三斗去金入諸藥再煎至一斗濾去滓投上好芒硝二斤半微火煎以柳木篦攪勿停手候欲凝入盆中更下研細硃砂真麝香各一兩急攪勻候冷貯於密器中勿令見風每服一錢溫水化下小兒半錢一字咽喉危急捻少許乾咽之痰證小半夏湯治痰逆粥藥不下胸膈不快停痰蓄水手足厥冷並天行病噫不止半夏不計多少湯洗七遍片切焙乾上每服一錢水一盞半入生薑切片半錢同煎至一盞去滓溫服若腹鳴有水聲每服加去瓤橘皮去皮茯苓各半錢煎如上法半夏化痰丸治痰實噁心嘔吐頭目昏暈心悸背寒臂病涎漱膈不快半夏一兩湯洗去滑赤茯苓半兩去皮白礬一分枯鉛白霜半兩上為末取生薑自然汁煮麵糊為丸如梧桐子大每服十五丸生薑湯下枳實丸治風痹痰實大便祕澀頭旋眩暈腹滿煩渴傷寒胃熱有燥屎譫言狂亂及結胸痛痞癰瘍瘡癤大黃半兩牽牛微炒取末半兩枳實麩炒去瓤人參一分上為末煉蜜為丸如梧桐子大每服三十丸溫水下未動再加丸數服之霍亂論曰陰陽不順清濁相干氣混中焦名為霍亂也皆由飽食豚膾復啖乳酪海陸百忌無所不食多飲寒漿眠臥冷席風冷之氣傷於脾胃諸食結而不消陰陽二氣壅而不通陽氣欲升陰氣欲降陰陽交錯變成吐利不已百脈昏亂榮衛俱虛冷轉於筋則令轉筋宜服無比香薷散方見後丸方治中暑霍亂吐瀉米穀不化臍腹疼痛滑瀉色白腳轉筋手足冷脾胃虛冷不思飲食腹脹不快及胸痹心痛並傷寒陰經受病不壯熱大便清穀脈虛弱而暈及婦人新産內虛人參白朮乾薑甘草炙各一兩上為細末煉蜜和丸如彈子大每服一丸湯化下日十服吐多利少者取枳實三枚炙四破水三升煮一升和一丸服吐少利多者取乾薑一兩水二升煮一升和一丸服頻吐利乾嘔者取半夏半兩湯洗去滑水二升煮取一升和一丸服若體疼痛不可堪者水三升煮棗三枚取一升和一丸服若大吐利轉筋者以韭汁洗腹腎從胸至足踝勿逆即止若體冷微汗腹中寒取附子一枚炮去皮四破水二升煮一升和一丸服吐利悉止脈不出體猶冷者可服諸湯補之厚朴湯治霍亂心煩厚朴炙高良薑桂心各三兩上㕮咀以水六升煮取三升分再服龍骨湯治霍亂吐利嘔逆龍骨黃連乾薑赤石脂當歸各三兩枳實五枚炙半夏一升洗附子炮去皮臍人參桂心甘草炙各二兩上㕮咀以水九升煮取三升分三服大豉湯治氣厥嘔噦不得息又主霍亂香豉一升半夏洗生薑切各二兩前胡外臺是柴胡桂心外臺無人參甘草炙各一兩上㕮咀以水五升煮取二升分三服勿使冷外臺云忌羊肉餳海藻菘菜等又方治霍亂吐利心煩不止豬糞如雞子大一枚為末以沸湯一升和之頓服良不差更作又方梁米粉五合水一升半和之如粥頓服須臾即止又方治霍亂止吐丁香十四枚以酒五合煮取二合頓服之用水煮之亦佳無比香薷散治非時霍亂吐利心腹撮痛大渴煩躁四肢厥逆汗自出兩腳轉筋疼痛厚朴去皮二兩黃連二兩二味入生薑四兩同杵炒令紫色香薷穗一兩半上為末每服五錢水酒各一盞同煎至一盞去滓令極冷頓服之五苓散治中暑噁心霍亂吐瀉煩燥飲水又治五淋小便不利臍下脹滿及胞轉不得小便小腹脹痛又治瘴氣溫瘧不伏水土或吐或瀉又治中酒噁心嘔吐痰水有入便吐心下痞悶又治黃疸遍黃橘色心中煩急眼如金小便赤澀或大便自利豬苓去黑皮十八銖澤瀉一兩白朮十八銖茯苓去皮十八銖肉桂去皮半兩上為細末每服二錢溫水冷水隨意調下若治黃疸煎茵陳湯調下日三腰痛論曰腰痛之為疾大法有四種有腎虛有腎著有䐴腰有風氣下流腎虛者腰胯痛小便淋瀝當服八味丸腎著者腰中冷痛如帶五千錢服腎著湯䐴腰者腰痛因俯仰即墮墮傷腰當服藥棋子風氣下流者腰痛腳重大便祕澀當服神功丸即愈方如下藥棋子治䐴腰疼痛氣滯牽牛一兩半生半炒取半兩為末上研入硫黃末一分再研勻分三分每一分用白麵一匙以水搜和前藥切作棋子於五更初以水半盞煮熟連湯溫食差即止初服未除隔日再服神功丸治三焦氣壅心腹痞悶六腑風熱大便不通津液內枯大腸乾澀裡急後重或下鮮血痰唾稠黏風氣下流腰腳重臍下脹痛溺赤如金陳無擇三因方云此藥當量虛實加減溫湯溫酒米飲皆可服食後臨臥服大黃三兩趙素風科集驗名大腹子人參半兩訶子皮炮二兩麻子仁五兩另研上為細末煉蜜為丸如梧桐子大每服二十丸溫水下日三早起日中以通為度眼治傷寒時氣後毒攻眼疼痛赤腫方露蜂房半兩上以水三盞煎至二盞露一夜溫冷任洗之瀉肝湯治肝熱目赤羞明隱痛生瘡翳膜赤腫黃芩黃連防風梔子仁各一兩大黃甘草炙各半兩上為散每服三錢水一大盞入竹葉十片同煎至八分去滓溫服若入朴硝一錢同煎取利即止後服又方治跋涉風土或道路誤為細塵眯目隱痛不能視物隨所眯目以手分開自以唾搽之即愈耳治蚰蜓入耳膽礬末一字以醋少許調灌之須臾蟲化為水口赴筵散治心脾勞熱口舌生瘡或赤或白不下飲食廣土即赤土荊芥朴硝各一兩上同研勻新汲水調服一錢小兒少與又方治口舌唇吻等瘡黃柏蜜炙一錢膩粉麝香各少許上研勻貼之日三四易齒細辛散治齒痛齦腫風癢攻槽疼痛不可忍細辛去葉芎藭香白芷甘松各一兩上為細末每用半錢擦牙痛便止或大痛不定以藥二錢入好雄黃末半錢生川烏頭末半錢拌勻少少擦之良久以鹽湯漱之治腎虛髓少齒痛方生地黃川芎各一錢上為末以漬齒根又方治齒痛宣露涎血臭氣川芎一錢竹葉二十片鹽少許細辛一錢上以水三大盞煎兩盞熱含漱冷吐之治牙齒疼痛腮腫齦疼不能齧物風蟲疼痛附子角八個巴豆一個去皮麝香一個上研為末蒸餅水浸為丸如黃米大以綿裹隨痛齒隱之中毒解中藥毒並蟲毒悶亂吐血煩躁甘草一兩生用白礬半兩生延胡索一兩上為細末每服半錢水一盞煎至六分去滓放冷細細呷之婦人科萬安丸治妊娠不足月損動胎不安或誤服藥胎欲下腹脹痛知母一兩上為末用熟棗肉為丸如彈子大每服一丸以秦艽糯米湯化下保安散治因漏胎胞干難産橫逆不下蟬蛻不計多少燈下燒存性上入真麝香少許研細臨産時淡醋湯調下半錢四物湯治婦人産前後百病崩中血不止及妊娠胎漏下血腹痛産後宜倍服去宿血養新血療腰腳疼痛當歸白芍藥川芎熟乾地黃各一兩上為散每服三錢水一盞入生薑三片同煎至七分去滓溫服若漏胎及崩中每服入炙阿膠二片熟艾半雞子大同煎若産後每服入童子小便少許小兒科麝香膏治小兒諸風驚涎寒熱發搐載幼幼新書麝香研乳香研青黛各半兩防風末硃砂研龍膽各三錢甘草炙四兩龍腦膩粉各一錢匕天南星炮墨燒各半錢上研細拌勻蜜劑成膏每二歲兒服半皂子大薄荷湯化下鉤藤飲治小兒吐利後臟虛慢驚手足瘛瘲多睡眼上視乳食不進鉤藤鉤三分芎藭白殭蠶去嘴炒蟬蛻去足翅各半兩蛇皮甘草炙各一分蜣螂五枚炙去頭翅足附子炮去皮臍半兩上為末每服二錢水一盞煎至六分去滓溫分三服急驚有熱證去附子不用定命丹治小兒急慢驚風天瘹臍風撮口搐搦奶癇壯熱天麻青黛各一分半天南星炮膩粉各一兩半硃砂研白附子炮各半兩麝香二字蠍尾十四個炮上研細拌勻用燒粟米飯為丸如緑豆大每服一丸薄荷湯化下急驚者水化滴入鼻中啼即搐定又方通治小兒急慢驚風手足搐搦日數十發搖頭弄舌百治不效垂困已上方並載幼幼新中蛇蛻皮一分牛黃研一錢上以水一盞先煎蛇皮至五分去滓調牛黃頓服五歲以上倍服利毒丸治小兒瘡疹欲出胃熱發溫氣粗腹滿大小便赤澀睡中驚煩渴口舌乾手足微冷多睡時漱涎脈實沉大滑數便宜服之大黃半兩膩粉炒一錢大青一錢龍腦硃砂各半錢檳榔生牽牛各一錢半黃芩青黛各一錢一本作二錢上研細末麵糊為丸如黃米大每二歲兒服八丸生薑蜜水下不動再服量兒大小虛實加減牛黃散治小兒瘡疹陽毒入胃便血日夜無節度腹痛啼哭已上二方並載幼幼新書牛黃一兩鬱金一兩上研細末每二歲兒服半錢以漿水半盞煎至三分和滓溫服量大小以此增減之日二服紫草散治小兒伏熱在胃經暴發痘疱瘡疹一切惡候出不快小便赤澀心腹脹滿錢乙四聖散同黃土湯治赤疹瘙癢煩躁昏悶伏龍肝即灶下黃土上研極細每服二錢生薑蜜水調下救生散治小兒瘡疹膿疱惡候危困陷下黑色豶豬血臘月內以新瓷罐盛掛於房東上陰乾為末馬牙硝研各一兩硃砂牛黃腦麝各一錢上研極細每二歲兒取一錢新汲水調下大便下惡物瘡疱紅色為度不過再服神驗無比玳瑁散治小兒瘡疹熱毒內攻紫黑色出不快生玳瑁水磨濃汁取一合豶豬心一個取中血一皂子大上合調勻濃煎紫草湯調服瘡科論曰大凡瘡腫本自畜熱或因服金石等藥或因父母服熱藥並飲酒消渴人多病此當以涼藥下之故孫真人千金方云病癰疽人如道途無藥可只以大黃下之者蓋攻其本也近人多不達此意至瘡腫既發而下之使毒內陷者失其旨矣宜切志之內治散治一切癰疽惡瘡毒氣內熏五臟噁心煩躁緑豆粉一兩乳香一分上研細末每服一錢新汲水調下神明膏治癰疽癤腫毒無頭疼痛或有數頭煩熱氣毒軟癤久不效五靈脂不計多少微炒上為末新水調塗於故緋絹上貼之論曰大凡傷瘡欲成痂時往往頻看及不時將護多中外風以至背急角弓反張有若痓病之狀皆由風入瘡口傳遍四肢經絡故如是或者便以治賊風之法攻汗此大非也有瘡人慎不可犯水或白痂時慎不可於風中看但以背指散貼之無不神效若瘡出血多其人必渴宜忍之並不可啖燥食鹽飲酒嗜羹只可食油及脂肥物為佳不惟能御外風兼可不渴若犯諸忌即血溢殺人又忌嗔怒大笑思想陰陽行動極宜謹此背指散貼一切傷瘡血出瘡痛若早貼不膿不痛檳榔黃連各一兩木香半兩上為末有傷便貼之如研下指血未定速將藥裹定便得連接又方治打撲腫痛傷折骨節磋跌脫臼內有瘀血疼痛不可忍硃砂定粉當歸蘇木各半兩上研細末每服一錢熱酒調下痛處熱為效雜傷論曰大凡湯火誤傷害人最急始覺熱痛多用冷物沃之以救其熱切不可也蓋火氣本陽得水則陰氣內薄必皮肉膿潰仍久不成痂使陰陽交激微者致極熱氣轉深侵壞筋骨如遇傷但以救痛散塗之無不即效治火傷被火燒處急向火炙之雖大痛強忍之少間不痛不膿治犬馬齧及馬骨刺傷人及馬血入舊瘡中方取灰汁熱漬瘡常令汁器有火數易其汁勿令爛人肉三數日漬之有腫者炙石令熱尉之日二消即止治蛇咬久不效及毒氣內攻疼痛方雄黃白礬上等分研就刀頭上爆令熔便貼咬傷處自差治在道途上大醉仆地或取涼地臥多為蛇入人竅方見時急以手捻定用刀刻破尾以椒或辛物置破尾上以綿系之少刻自出此蛇有逆骨慎不可以力拔之須切記壁鏡咬人立死治之方檳榔不計多少上燒灰存性先以醋淋洗後以醋調貼之
